<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>后台登录 - Team 邀请助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['JetBrains Mono', 'SF Mono', 'Menlo', 'monospace'],
                    },
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                    },
                    borderRadius: {
                        lg: "var(--radius)",
                        md: "calc(var(--radius) - 2px)",
                        sm: "calc(var(--radius) - 4px)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            'from': { opacity: '0' },
                            'to': { opacity: '1' },
                        },
                        slideUp: {
                            'from': { opacity: '0', transform: 'translateY(10px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%;
            --accent-foreground: 240 5.9% 10%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 5.9% 10%;
            --radius: 0.5rem;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }

        .shadcn-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
            height: 2.5rem;
            padding-left: 1rem;
            padding-right: 1rem;
            cursor: pointer;
        }

        .shadcn-btn:focus-visible {
            outline: 2px solid hsl(var(--ring));
            outline-offset: 2px;
        }

        .shadcn-btn-primary {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
        }

        .shadcn-btn-primary:hover {
            background-color: hsl(var(--primary) / 0.9);
        }

        .shadcn-input {
            width: 100%;
            height: 2.5rem;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--input));
            background-color: transparent;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            transition: all 0.15s;
        }

        .shadcn-input:focus-visible {
            outline: 2px solid hsl(var(--ring));
            outline-offset: 2px;
            border-color: hsl(var(--ring));
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div
        class="bg-white w-full max-w-[850px] h-auto md:h-[500px] rounded-2xl shadow-xl flex overflow-hidden border border-gray-200 animate-fade-in">

        <!-- Left Panel: Visuals -->
        <div
            class="hidden md:flex w-1/2 bg-zinc-50 border-r border-gray-100 p-12 flex-col justify-between relative overflow-hidden">
            <!-- Decorative Elements -->
            <div
                class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px] [mask-image:radial-gradient(ellipse_50%_50%_at_50%_50%,#000_70%,transparent_100%)]">
            </div>

            <div class="relative z-10">
                <div class="h-10 w-10 bg-black rounded-lg flex items-center justify-center mb-6 overflow-hidden">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
                        class="w-full h-full object-cover">
                </div>
                <h2 class="text-2xl font-bold tracking-tight text-gray-900">Admin Portal</h2>
                <p class="text-gray-500 mt-2 text-sm leading-relaxed">
                    安全登录入口，用于管理 ChatGPT Team 邀请、激活码及监控系统状态。
                </p>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-2 text-xs text-gray-400 font-mono">
                    <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
                    System Operational
                </div>
            </div>
        </div>

        <!-- Right Panel: Form -->
        <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
            <div class="max-w-xs mx-auto w-full">
                <div class="text-center mb-8 md:text-left">
                    <h1 class="text-2xl font-semibold tracking-tight text-gray-900">欢迎回来</h1>
                    <p class="text-sm text-gray-500 mt-2">请输入管理员密码以继续</p>
                </div>

                <form action="/admin/login" method="POST" class="space-y-4">
                    {% if error %}
                    <div
                        class="p-3 rounded-md bg-red-50 text-red-600 border border-red-100 text-xs font-medium flex items-center gap-2 animate-fade-in">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        {{ error }}
                    </div>
                    {% endif %}

                    <div class="space-y-2">
                        <label class="text-sm font-medium leading-none text-gray-700">密码</label>
                        <div class="relative">
                            <input type="password" name="password" placeholder="••••••••" required
                                class="shadcn-input pr-10">
                            <i
                                class="fa-solid fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        </div>
                    </div>

                    <button type="submit" class="shadcn-btn shadcn-btn-primary w-full mt-2">
                        登录
                    </button>

                    <div class="pt-4 text-center">
                        <a href="/"
                            class="text-sm text-gray-500 hover:text-gray-900 hover:underline underline-offset-4 transition-colors">
                            ← 返回首页
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
